#debug: true
spring:
  application:
    name: luu-ubas
  cloud:
    config:
      uri: http://ec2-3-135-9-238.us-east-2.compute.amazonaws.com:9999
      fail-fast: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        multiplier: 2
        max-attempts: 10
  jpa:
    open-in-view: true
    database: mysql
    show-sql: false
    hibernate:
      ddl-auto: update # create-drop
  security:
    oauth2:
      client:
        registration:
          myclient:
            client-id: SampleClientId
            client-secret: tgb.258
            provider: myoauth
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:6000/login/oauth2/code/myclient
            client-authentication-method: post
        provider:
          myoauth:
            authorization-uri: http://216.194.165.205:5000/oauth/authorize
            token-uri: http://216.194.165.205:5000/oauth/token
            user-info-uri: http://216.194.165.205:5000/user/me
            user-name-attribute: username