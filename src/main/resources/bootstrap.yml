spring:
  application:
    name: luu-ubas
  cloud:
    config:
      uri: http://ec2-3-135-9-238.us-east-2.compute.amazonaws.com:9999
      fail-fast: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        multiplier: 2
        max-attempts: 10
  jpa:
    open-in-view: true
    database: mysql
    show-sql: false
    hibernate:
      ddl-auto: update # create-drop
