server:
  port: 6000
  servlet:
    session:
      cookie:
        name: UISESSION
spring:
  application:
    name: luu-ubas
  cloud:
    config:
      uri: http://ec2-3-135-9-238.us-east-2.compute.amazonaws.com:9999
      fail-fast: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        multiplier: 2
        max-attempts: 10
  thymeleaf:
    cache: false
  jpa:
    open-in-view: true
    database: mysql
    show-sql: false
    hibernate:
      ddl-auto: update # create-drop
  security:
    oauth2:
      client:
        registration:
          custom-client:
            client-id: luu
            client-secret: luu
            client-name: luu-ubas
            scope: user_info
            provider: custom-provider
            redirect-uri: http://localhost:6000/login/oauth2/code
            client-authentication-method: basic
            authorization-grant-type: authorization_code
        provider:
          custom-provider:
            token-uri: http://216.194.165.205:5000/auth/oauth/token
            authorization-uri: http://216.194.165.205:5000/auth/oauth/authorize
            user-info-uri: http://216.194.165.205:5000/auth/user/me
            user-name-attribute: name