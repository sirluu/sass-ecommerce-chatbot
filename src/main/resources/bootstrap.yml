spring:
  application:
    name: luu-ubas
  cloud:
    config:
      uri: http://178.62.90.171:9999
      fail-fast: true
      retry:
        initial-interval: 2000
        max-interval: 10000
        multiplier: 2
        max-attempts: 10
  main:
    allow-bean-definition-overriding: true
security:
  oauth2:
    client:
      client-id: luu
      client-secret: luu
      access-token-uri: http://216.194.165.205:5000/oauth/token
      user-authorization-uri: http://216.194.165.205:5000/oauth/authorize
      grant-type: password
#      scope: user_info
    resource:
      token-info-uri: http://216.194.165.205:5000/oauth/check_token
      user-info-uri: http://216.194.165.205:5000/user/me
      prefer-token-info: false
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://199.244.51.123:8765/eureka
logging:
  level:
    org.springframework.security: INFO